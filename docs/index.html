<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lobster.js</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <div id="app">Loading...</div>
    <script type="module">
      import { loadMarkdown } from './lobster.js';
      const app = document.getElementById('app');
      const lang = new URLSearchParams(location.search).get('lang') ?? 'en';
      const src  = lang === 'ja' ? './content-ja.md' : './content.md';

      document.documentElement.lang = lang === 'ja' ? 'ja' : 'en';

      loadMarkdown(src, app)
        .then(() => {
          // Language toggle button
          const toggle = document.createElement('a');
          toggle.href = lang === 'ja' ? './' : './?lang=ja';
          toggle.textContent = lang === 'ja' ? 'English' : '日本語';
          toggle.className = 'lbs-lang-toggle';
          document.querySelector('.lbs-header')?.appendChild(toggle);
        })
        .then(() => fetch(src))
        .then(r => r.text())
        .then(md => {
          const escaped = md.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
          const label = lang === 'ja' ? 'このページの Markdown ソースを見る' : 'View source Markdown of this page';
          const details = document.createElement('details');
          details.className = 'lbs-details';
          details.innerHTML =
            `<summary class="lbs-summary">${label}</summary>` +
            '<div class="lbs-code-block"><pre><code>' + escaped + '</code></pre></div>';
          app.appendChild(details);
        })
        .catch(err => {
          app.textContent = 'Failed to load: ' + err.message;
        });
    </script>
  </body>
</html>
