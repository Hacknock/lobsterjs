<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lobster.js</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <div id="app">Loading...</div>
    <script type="module">
      import { loadMarkdown } from './lobster.js';
      const app = document.getElementById('app');
      loadMarkdown('./content.md', app)
        .then(() => fetch('./content.md'))
        .then(r => r.text())
        .then(md => {
          const escaped = md.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
          const details = document.createElement('details');
          details.className = 'lbs-details';
          details.innerHTML =
            '<summary class="lbs-summary">View source Markdown of this page</summary>' +
            '<div class="lbs-code-block"><pre><code>' + escaped + '</code></pre></div>';
          app.appendChild(details);
        })
        .catch(err => {
          app.textContent = 'Failed to load: ' + err.message;
        });
    </script>
  </body>
</html>
